name: Daily Video Curation with Gemini

on:
  schedule:
    - cron: '0 2 * * *'  # 2 AM UTC daily
  workflow_dispatch:

permissions:
  contents: write

jobs:
  curate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip' # Speeds up subsequent runs by caching dependencies

      - name: Install dependencies
        run: |
          pip install google-genai requests

      - name: Run curation script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY_AI }}
        run: python aibuilder/curate_videos.py

      - name: Commit and push changes
        run: |
          git config user.name "AI Curator Bot"
          git config user.email "bot@aibuilder.space"
          git add aibuilder/videos.json
          
          # Check if there are actually changes before attempting to commit and push
          if git diff --staged --quiet; then
            echo "No new video data to update."
          else
            git commit -m "🤖 Daily video curation - $(date +'%Y-%m-%d')"
            git push
          fi
